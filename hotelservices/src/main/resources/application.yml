server:
  port: 8082

spring:
  application:
    name: HOTELSERVICES

  datasource:
    url: jdbc:mysql://localhost:3306/mshotelservices
    username: root
    password: nic@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false

  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka